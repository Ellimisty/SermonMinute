<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Sermon Cards - 3 Minute Sermon</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #fff;
            padding: 0;
            margin: 0;
            display: block;
        }
        #print-settings {
            background: #f4f1ea;
            padding: 1.5rem;
            border-bottom: 2px solid #ddd;
            display: flex;
            gap: 2rem;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        @media print {
            #print-settings { display: none; }
            body { padding: 0; }
        }
        .avery-grid {
            display: grid;
            grid-template-columns: repeat(2, 3.5in);
            grid-template-rows: repeat(5, 2in);
            gap: 0;
            width: 7in;
            margin: 0.5in auto;
            border: 1px dashed #ccc;
        }
        @media print {
            .avery-grid {
                margin: 0;
                border: none;
                page-break-after: always;
            }
        }
        .print-card {
            width: 3.5in;
            height: 2in;
            border: 1px solid #eee;
            padding: 0.2in;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Playfair Display', serif;
            position: relative;
        }
        .print-card.ot { border-left: 5px solid #d9534f; }
        .print-card.nt { border-left: 5px solid #337ab7; }
        
        .print-verse {
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }
        .print-ref {
            font-size: 0.8rem;
            font-weight: bold;
            color: #666;
        }
        .print-topic {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="print-settings">
        <h2>Print Templates</h2>
        <div>
            <label>Set: </label>
            <select id="set-filter" title="Select testament to print">
                <option value="all">All Cards</option>
                <option value="OT">Old Testament Only</option>
                <option value="NT">New Testament Only</option>
            </select>
        </div>
        <button onclick="window.print()" class="primary-btn">Print Now</button>
        <button onclick="window.close()" class="secondary-btn">Close</button>
    </div>

    <div id="pages-container"></div>

    <script>
        async function loadAndRender() {
            const response = await fetch('data/cards.json');
            const cards = await response.json();
            const filter = document.getElementById('set-filter');
            
            function render() {
                const type = filter.value;
                const filtered = type === 'all' ? cards : cards.filter(c => c.testament === type);
                const container = document.getElementById('pages-container');
                container.innerHTML = '';

                for (let i = 0; i < filtered.length; i += 10) {
                    const grid = document.createElement('div');
                    grid.className = 'avery-grid';
                    
                    const chunk = filtered.slice(i, i + 10);
                    chunk.forEach(card => {
                        const el = document.createElement('div');
                        el.className = `print-card ${card.testament.toLowerCase()}`;
                        el.innerHTML = `
                            <span class="print-topic">${card.topic}</span>
                            <p class="print-verse">"${card.verse}"</p>
                            <p class="print-ref">${card.reference}</p>
                        `;
                        grid.appendChild(el);
                    });
                    container.appendChild(grid);
                }
            }

            filter.addEventListener('change', render);
            render();
        }
        loadAndRender();
    </script>
</body>
</html>
